<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مسابقة العباقرة</title>
    
    <!-- Font Awesome للأيقونات المودرن -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <style>
        /* ===== نظام الألوان المتغير ===== */
        :root {
            --primary: #6C5CE7;
            --secondary: #00CEC9;
            --accent: #FDCB6E;
            --success: #00B894;
            --danger: #FF6B6B;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --team1-color: #6C5CE7;
            --team2-color: #FF6B6B;
            --text-light: #dfe6e9;
            --border-color: #2d3436;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--card-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        /* ===== Screens ===== */
        .screen {
            display: none;
            width: 100%;
            min-height: 100vh;
            animation: fadeIn 0.5s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Header with Logo ===== */
        .header-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.1), rgba(0, 206, 201, 0.1));
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(108, 92, 231, 0.2);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #siteLogo {
            max-height: 70px;
            width: auto;
            border-radius: 12px;
            transition: all 0.3s;
        }

        #siteLogo:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        .header-logo h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-logo .subtitle {
            color: var(--accent);
            font-size: 0.9em;
            -webkit-text-fill-color: var(--accent);
        }

        /* ===== Container ===== */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== Cards ===== */
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .card h3 {
            color: var(--primary);
            margin-bottom: 18px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h3 i {
            font-size: 1.2em;
        }

        /* ===== Form Elements ===== */
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            background: #2d3436;
            border: 2px solid var(--border-color);
            color: var(--text-light);
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.2);
        }

        input[type="color"] {
            padding: 4px;
            height: 50px;
            cursor: pointer;
        }

        /* ===== Buttons ===== */
        button {
            width: 100%;
            padding: 12px 20px;
            margin: 5px 0;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.3);
            filter: brightness(1.1);
        }

        button:active {
            transform: scale(0.95);
        }

        button i {
            font-size: 1.1em;
        }

        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--accent); color: #2d3436; }
        .btn-secondary { background: #636e72; }
        .btn-team1 { background: var(--team1-color); }
        .btn-team2 { background: var(--team2-color); }

        /* ===== Question List ===== */
        .question-item {
            background: #2d3436;
            padding: 12px 16px;
            margin: 6px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid var(--primary);
            transition: all 0.3s;
        }

        .question-item:hover {
            background: #3d4446;
        }

        .question-item .q-text {
            flex: 1;
            margin-left: 10px;
        }

        .question-item .q-category {
            color: var(--accent);
            font-size: 0.85em;
            background: rgba(253, 203, 110, 0.1);
            padding: 2px 12px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .question-item button {
            width: auto;
            padding: 5px 12px;
            margin: 0 3px;
            font-size: 13px;
        }

        /* ===== Game Screen ===== */
        .game-container {
            display: grid;
            grid-template-columns: 220px 1fr 220px;
            gap: 0;
            height: 100vh;
            background: linear-gradient(145deg, var(--dark-bg), var(--card-bg));
            position: relative;
        }

        /* ===== Teams ===== */
        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .team-right {
            border-right: 3px solid var(--team1-color);
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.05), transparent);
        }

        .team-left {
            border-left: 3px solid var(--team2-color);
            background: linear-gradient(135deg, transparent, rgba(255, 107, 107, 0.05));
        }

        .team-logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .team-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 8px 20px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            text-align: center;
        }

        .team-score {
            font-size: 68px;
            font-weight: 900;
            margin: 15px 0;
            text-shadow: 0 0 40px rgba(255,255,255,0.1);
            transition: all 0.5s;
        }

        .team-right .team-score {
            color: var(--team1-color);
        }

        .team-left .team-score {
            color: var(--team2-color);
        }

        .team-answers {
            font-size: 16px;
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .team-answers span {
            padding: 6px 14px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .team-answers .correct { color: var(--success); }
        .team-answers .wrong { color: var(--danger); }

        /* ===== Game Center ===== */
        .game-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            gap: 20px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 750px;
            font-size: 18px;
            color: #b2bec3;
            padding: 0 10px;
        }

        .game-header .category {
            color: var(--accent);
            font-weight: bold;
            background: rgba(253, 203, 110, 0.1);
            padding: 6px 18px;
            border-radius: 20px;
        }

        .game-header .question-number {
            background: rgba(255,255,255,0.05);
            padding: 6px 18px;
            border-radius: 20px;
        }

        /* ===== Timer ===== */
        .timer {
            font-size: 72px;
            font-weight: 900;
            color: var(--success);
            text-shadow: 0 0 60px rgba(0, 206, 201, 0.2);
            transition: all 0.3s;
            min-width: 120px;
            text-align: center;
        }

        .timer.warning {
            color: var(--danger);
            animation: pulse 0.5s infinite;
            text-shadow: 0 0 60px rgba(255, 107, 107, 0.3);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* ===== Question ===== */
        .question-text {
            font-size: 30px;
            text-align: center;
            max-width: 750px;
            line-height: 1.7;
            padding: 25px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            width: 100%;
        }

        /* ===== Options ===== */
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 750px;
        }

        .options button {
            padding: 18px 22px;
            font-size: 18px;
            background: #2d3436;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-light);
            text-align: right;
            justify-content: flex-start;
            font-weight: 500;
        }

        .options button:hover:not(:disabled) {
            background: #3d4446;
            transform: scale(1.02);
            border-color: var(--primary);
        }

        .options button .opt-letter {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: rgba(108, 92, 231, 0.2);
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            color: var(--primary);
            margin-left: 12px;
        }

        .options button.correct {
            background: var(--success) !important;
            border-color: var(--success) !important;
            box-shadow: 0 0 40px rgba(0, 184, 148, 0.4);
        }

        .options button.correct .opt-letter {
            background: rgba(255,255,255,0.3);
            color: #fff;
        }

        .options button.wrong {
            background: var(--danger) !important;
            border-color: var(--danger) !important;
            box-shadow: 0 0 40px rgba(255, 107, 107, 0.4);
        }

        .options button.wrong .opt-letter {
            background: rgba(255,255,255,0.3);
            color: #fff;
        }

        .options button:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* ===== Game Controls ===== */
        .game-controls {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 750px;
        }

        .game-controls button {
            flex: 1;
            padding: 14px 20px;
            font-size: 17px;
        }

        /* ===== Select Category ===== */
        .category-selector {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 750px;
            flex-wrap: wrap;
        }

        .category-selector select {
            flex: 2;
            min-width: 150px;
        }

        .category-selector button {
            flex: 1;
            min-width: 120px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 1024px) {
            .game-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                height: auto;
                min-height: 100vh;
            }
            
            .team {
                flex-direction: row;
                padding: 15px 20px;
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .team-right { border-right: none; border-bottom: 3px solid var(--team1-color); }
            .team-left { border-left: none; border-top: 3px solid var(--team2-color); }
            
            .team-score {
                font-size: 40px;
                margin: 0 10px;
            }
            
            .team-logo { font-size: 32px; }
            .team-name { font-size: 16px; margin-bottom: 0; }
            
            .game-center { padding: 20px; }
            .question-text { font-size: 22px; min-height: 80px; padding: 18px; }
            .options { grid-template-columns: 1fr; }
            .options button { font-size: 16px; padding: 14px 18px; }
            .timer { font-size: 48px; }
        }

        @media (max-width: 600px) {
            .admin-grid { grid-template-columns: 1fr; }
            .header-logo h1 { font-size: 1.5em; }
            #siteLogo { max-height: 50px; }
            .game-controls { flex-direction: column; }
            .category-selector { flex-direction: column; }
        }

        /* ===== Loading Animation ===== */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== Toast Notification ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 28px;
            background: var(--card-bg);
            border: 1px solid var(--primary);
            border-radius: 12px;
            color: var(--text-light);
            box-shadow: var(--shadow);
            z-index: 9999;
            animation: slideUp 0.5s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 400px;
        }

        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }
        .toast.warning { border-color: var(--accent); }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<!-- ==================== شاشة الإدارة ==================== -->
<div id="adminScreen" class="screen active">
    <div class="container">
        <!-- Header with Logo -->
        <div class="header-logo">
            <div class="logo-container">
                <!-- استبدل logo.png بصورة اللوجو بتاعتك -->
                <img id="siteLogo" src="G:\العباقرة خدام/logo.png/70x70/6C5CE7/FFFFFF?text=🏆" alt="شعار المسابقة" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2270%22 height=%2270%22%3E%3Crect width=%2270%22 height=%2270%22 fill=%22%236C5CE7%22/%3E%3Ctext x=%2235%22 y=%2245%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2230%22 font-family=%22Arial%22%3E🏆%3C/text%3E%3C/svg%3E'" />
                <div>
                    <h1>مسابقة العباقرة</h1>
                    <span class="subtitle"><i class="fas fa-crown"></i> نسخة احترافية</span>
                </div>
            </div>
        </div>

        <div class="admin-grid">
            <!-- إضافة سؤال -->
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> إضافة سؤال جديد</h3>
                <input type="text" id="questionText" placeholder="📝 نص السؤال" />
                <input type="text" id="opt1" placeholder="1️⃣ الاختيار 1" />
                <input type="text" id="opt2" placeholder="2️⃣ الاختيار 2" />
                <input type="text" id="opt3" placeholder="3️⃣ الاختيار 3" />
                <input type="text" id="opt4" placeholder="4️⃣ الاختيار 4" />
                <select id="correctAnswer">
                    <option value="0">✅ الإجابة الصحيحة - اختيار 1</option>
                    <option value="1">✅ الإجابة الصحيحة - اختيار 2</option>
                    <option value="2">✅ الإجابة الصحيحة - اختيار 3</option>
                    <option value="3">✅ الإجابة الصحيحة - اختيار 4</option>
                </select>
                <input type="text" id="questionCategory" placeholder="📂 القسم (مثل: تاريخ، علوم)" />
                <button onclick="addQuestion()" class="btn-success"><i class="fas fa-save"></i> إضافة السؤال</button>
            </div>

            <!-- قائمة الأسئلة -->
            <div class="card" style="grid-column: span 2;">
                <h3><i class="fas fa-list"></i> قائمة الأسئلة (<span id="questionCount">0</span>)</h3>
                <div id="questionList" style="max-height: 350px; overflow-y: auto;"></div>
                <div style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
                    <button onclick="shuffleQuestions()" class="btn-warning"><i class="fas fa-random"></i> خلط</button>
                    <button onclick="resetAll()" class="btn-secondary"><i class="fas fa-undo"></i> إعادة تعيين</button>
                    <button onclick="clearAllQuestions()" class="btn-danger"><i class="fas fa-trash"></i> حذف الكل</button>
                    <button onclick="exportQuestions()" class="btn-success"><i class="fas fa-download"></i> تصدير</button>
                    <button onclick="document.getElementById('importFile').click()" style="background: #f39c12;"><i class="fas fa-upload"></i> استيراد</button>
                    <input type="file" id="importFile" accept=".json" onchange="importQuestions(event)" style="display: none;">
                    <button onclick="copyQuestionsText()" style="background: #00b894;"><i class="fas fa-copy"></i> نسخ نص</button>
                    <button onclick="pasteQuestionsFromText()" style="background: #6c5ce7;"><i class="fas fa-paste"></i> لصق نص</button>
                </div>
            </div>

            <!-- إعدادات المسابقة -->
            <div class="card">
                <h3><i class="fas fa-sliders-h"></i> إعدادات المسابقة</h3>
                <label><i class="fas fa-clock"></i> زمن الإجابة (ثانية):</label>
                <input type="number" id="timerDuration" value="30" min="5" max="120" />
                
                <label><i class="fas fa-users"></i> عدد الأسئلة لكل فريق:</label>
                <input type="number" id="questionsPerTeam" value="10" min="1" max="50" />

                <label><i class="fas fa-layer-group"></i> اختيار القسم:</label>
                <div class="category-selector" style="width: 100%;">
                    <select id="categorySelect">
                        <option value="all">🎲 جميع الأقسام</option>
                    </select>
                    <button onclick="selectRandomCategory()" style="flex: 0.5; background: var(--accent); color: #2d3436;">
                        <i class="fas fa-dice"></i> عشوائي
                    </button>
                </div>

                <button onclick="startGame()" style="background: var(--success); font-size: 20px; margin-top: 10px;">
                    <i class="fas fa-play"></i> بدء المسابقة
                </button>
            </div>

            <!-- تخصيص الألوان -->
            <div class="card">
                <h3><i class="fas fa-palette"></i> تخصيص الألوان</h3>
                <label><i class="fas fa-users"></i> لون الفريق الأيمن:</label>
                <input type="color" id="team1Color" value="#6C5CE7" onchange="updateColors()" />
                <label><i class="fas fa-users"></i> لون الفريق الأيسر:</label>
                <input type="color" id="team2Color" value="#FF6B6B" onchange="updateColors()" />
                <label><i class="fas fa-circle"></i> لون الخلفية:</label>
                <input type="color" id="bgColor" value="#0a0a0a" onchange="updateColors()" />
                <button onclick="resetColors()" class="btn-secondary"><i class="fas fa-undo-alt"></i> استعادة الافتراضي</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================== شاشة اللعبة ==================== -->
<div id="gameScreen" class="screen">
    <div class="game-container">
        <!-- الفريق الأيمن -->
        <div class="team team-right">
            <div class="team-logo">🟣</div>
            <div class="team-name">الفريق الأيمن</div>
            <div class="team-score" id="team1Score">0</div>
            <div class="team-answers">
                <span class="correct"><i class="fas fa-check-circle"></i> <span id="team1Correct">0</span></span>
                <span class="wrong"><i class="fas fa-times-circle"></i> <span id="team1Wrong">0</span></span>
            </div>
        </div>

        <!-- المنتصف -->
        <div class="game-center">
            <div class="game-header">
                <span class="category" id="currentCategory"><i class="fas fa-tag"></i> القسم</span>
                <span class="question-number" id="questionNumber"><i class="fas fa-hashtag"></i> 1 / 10</span>
            </div>
            
            <div class="timer" id="timerDisplay">30</div>
            
            <div class="question-text" id="questionTextDisplay">
                <i class="fas fa-lightbulb" style="color: var(--accent); margin-left: 12px;"></i>
                اضغط "بدء" لظهور السؤال
            </div>
            
            <div class="options" id="optionsContainer">
                <!-- الأزرار تتولد هنا -->
            </div>

            <div class="game-controls">
                <button onclick="nextQuestion()" id="nextBtn" disabled><i class="fas fa-forward"></i> السؤال التالي</button>
                <button onclick="endGame()" class="btn-danger"><i class="fas fa-stop-circle"></i> إنهاء</button>
                <button onclick="resetGame()" class="btn-secondary"><i class="fas fa-arrow-right"></i> للخلف</button>
            </div>
        </div>

        <!-- الفريق الأيسر -->
        <div class="team team-left">
            <div class="team-logo">🔴</div>
            <div class="team-name">الفريق الأيسر</div>
            <div class="team-score" id="team2Score">0</div>
            <div class="team-answers">
                <span class="correct"><i class="fas fa-check-circle"></i> <span id="team2Correct">0</span></span>
                <span class="wrong"><i class="fas fa-times-circle"></i> <span id="team2Wrong">0</span></span>
            </div>
        </div>
    </div>
</div>

<!-- ==================== JavaScript ==================== -->
<script>
// ========== البيانات ==========
let questions = [];
let gameQuestions = [];
let currentIndex = 0;
let timerInterval = null;
let timeLeft = 30;
let isAnswered = false;
let currentTeam = 1;

let teamScores = { 1: 0, 2: 0 };
let teamCorrect = { 1: 0, 2: 0 };
let teamWrong = { 1: 0, 2: 0 };

// ========== التحميل والحفظ ==========
function loadData() {
    const saved = localStorage.getItem('quizData');
    if (saved) {
        const data = JSON.parse(saved);
        questions = data.questions || [];
        teamScores = data.scores || { 1: 0, 2: 0 };
        teamCorrect = data.correct || { 1: 0, 2: 0 };
        teamWrong = data.wrong || { 1: 0, 2: 0 };
    }
    updateQuestionList();
    updateTeamDisplay();
    updateCategorySelect();
    loadColors();
}

function saveData() {
    localStorage.setItem('quizData', JSON.stringify({
        questions: questions,
        scores: teamScores,
        correct: teamCorrect,
        wrong: teamWrong
    }));
}

// ========== إدارة الأسئلة ==========
function addQuestion() {
    const text = document.getElementById('questionText').value.trim();
    const opt1 = document.getElementById('opt1').value.trim();
    const opt2 = document.getElementById('opt2').value.trim();
    const opt3 = document.getElementById('opt3').value.trim();
    const opt4 = document.getElementById('opt4').value.trim();
    const correct = parseInt(document.getElementById('correctAnswer').value);
    const category = document.getElementById('questionCategory').value.trim() || 'عام';

    if (!text || !opt1 || !opt2 || !opt3 || !opt4) {
        showToast('يرجى ملء جميع الحقول!', 'error');
        return;
    }

    questions.push({
        id: Date.now() + Math.random() * 1000,
        text,
        options: [opt1, opt2, opt3, opt4],
        correct,
        category,
        used: false
    });

    document.getElementById('questionText').value = '';
    document.getElementById('opt1').value = '';
    document.getElementById('opt2').value = '';
    document.getElementById('opt3').value = '';
    document.getElementById('opt4').value = '';
    document.getElementById('questionCategory').value = '';

    saveData();
    updateQuestionList();
    updateCategorySelect();
    showToast('✅ تم إضافة السؤال بنجاح!', 'success');
}

function deleteQuestion(id) {
    if (confirm('هل أنت متأكد من حذف هذا السؤال؟')) {
        questions = questions.filter(q => q.id !== id);
        saveData();
        updateQuestionList();
        updateCategorySelect();
        showToast('🗑️ تم حذف السؤال', 'warning');
    }
}

function updateQuestionList() {
    const list = document.getElementById('questionList');
    const count = document.getElementById('questionCount');
    count.textContent = questions.length;

    if (questions.length === 0) {
        list.innerHTML = '<p style="color: #888; text-align: center; padding: 20px;"><i class="fas fa-inbox"></i> لا توجد أسئلة، أضف سؤالاً!</p>';
        return;
    }

    list.innerHTML = questions.map((q, i) => `
        <div class="question-item">
            <span class="q-text">${i+1}. ${q.text.substring(0, 50)}${q.text.length > 50 ? '...' : ''}</span>
            <span class="q-category"><i class="fas fa-folder"></i> ${q.category}</span>
            <div>
                <button onclick="deleteQuestion(${q.id})" class="btn-danger" style="width: auto; padding: 4px 12px; font-size: 13px;">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>
    `).join('');
}

function updateCategorySelect() {
    const select = document.getElementById('categorySelect');
    const categories = [...new Set(questions.map(q => q.category))];
    
    // حفظ القيمة المحددة
    const currentVal = select.value;
    
    select.innerHTML = '<option value="all">🎲 جميع الأقسام</option>';
    categories.forEach(cat => {
        select.innerHTML += `<option value="${cat}">📂 ${cat}</option>`;
    });
    
    // استعادة القيمة
    if ([...select.options].some(opt => opt.value === currentVal)) {
        select.value = currentVal;
    }
}

function selectRandomCategory() {
    const select = document.getElementById('categorySelect');
    const options = [...select.options].filter(opt => opt.value !== 'all');
    if (options.length === 0) {
        showToast('⚠️ لا توجد أقسام متاحة!', 'warning');
        return;
    }
    const random = options[Math.floor(Math.random() * options.length)];
    select.value = random.value;
    showToast(`🎲 تم اختيار قسم: ${random.text}`, 'success');
}

function shuffleQuestions() {
    const shuffled = [...questions];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    questions = shuffled;
    questions.forEach(q => q.used = false);
    saveData();
    updateQuestionList();
    showToast('🔀 تم خلط الأسئلة!', 'success');
}

function clearAllQuestions() {
    if (confirm('⚠️ هل أنت متأكد من حذف جميع الأسئلة؟')) {
        questions = [];
        saveData();
        updateQuestionList();
        updateCategorySelect();
        showToast('🗑️ تم حذف جميع الأسئلة', 'warning');
    }
}

function resetAll() {
    if (confirm('🔄 إعادة تعيين كل شيء (الأسئلة والنقاط)؟')) {
        questions = [];
        teamScores = { 1: 0, 2: 0 };
        teamCorrect = { 1: 0, 2: 0 };
        teamWrong = { 1: 0, 2: 0 };
        saveData();
        updateQuestionList();
        updateTeamDisplay();
        updateCategorySelect();
        showToast('✅ تم إعادة التعيين!', 'success');
    }
}

// ========== تصدير واستيراد ==========
function exportQuestions() {
    if (questions.length === 0) {
        showToast('⚠️ لا توجد أسئلة للتصدير!', 'warning');
        return;
    }
    
    const data = {
        questions: questions,
        version: '1.0',
        exportDate: new Date().toLocaleString()
    };
    
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = `اسئلة_المسابقة_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📤 تم تصدير الأسئلة!', 'success');
}

function importQuestions(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            
            if (!data.questions || !Array.isArray(data.questions)) {
                showToast('⚠️ ملف غير صالح!', 'error');
                return;
            }
            
            const existingIds = new Set(questions.map(q => q.id));
            let addedCount = 0;
            
            data.questions.forEach(q => {
                if (!existingIds.has(q.id)) {
                    questions.push(q);
                    addedCount++;
                }
            });
            
            saveData();
            updateQuestionList();
            updateCategorySelect();
            showToast(`✅ تم استيراد ${addedCount} سؤال بنجاح!`, 'success');
            
        } catch (error) {
            showToast('⚠️ حدث خطأ في قراءة الملف!', 'error');
            console.error(error);
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function copyQuestionsText() {
    if (questions.length === 0) {
        showToast('⚠️ لا توجد أسئلة للنسخ!', 'warning');
        return;
    }
    
    let text = '=== مسابقة العباقرة - الأسئلة ===\n\n';
    questions.forEach((q, i) => {
        text += `سؤال ${i+1}: ${q.text}\n`;
        text += `القسم: ${q.category}\n`;
        q.options.forEach((opt, idx) => {
            text += `  ${String.fromCharCode(65 + idx)}. ${opt}${idx === q.correct ? ' ✅' : ''}\n`;
        });
        text += '\n';
    });
    
    navigator.clipboard.writeText(text).then(() => {
        showToast('✅ تم نسخ الأسئلة!', 'success');
    }).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast('✅ تم نسخ الأسئلة!', 'success');
    });
}

function pasteQuestionsFromText() {
    const text = prompt('📝 الصق النص الذي يحتوي على الأسئلة:');
    if (!text) return;
    
    const lines = text.split('\n').filter(line => line.trim());
    let newQuestions = [];
    let currentQ = null;
    
    lines.forEach(line => {
        line = line.trim();
        if (line.startsWith('سؤال')) {
            if (currentQ) newQuestions.push(currentQ);
            currentQ = {
                id: Date.now() + Math.random() * 1000,
                text: line.replace(/^سؤال\s*\d+:\s*/, ''),
                options: [],
                correct: 0,
                category: 'عام',
                used: false
            };
        } else if (line.startsWith('القسم:')) {
            if (currentQ) currentQ.category = line.replace('القسم:', '').trim();
        } else if (/^[A-D]\)/.test(line)) {
            if (currentQ) {
                const opt = line.replace(/^[A-D]\)\s*/, '').replace(' ✅', '');
                currentQ.options.push(opt);
                if (line.includes('✅')) {
                    currentQ.correct = currentQ.options.length - 1;
                }
            }
        }
    });
    
    if (currentQ) newQuestions.push(currentQ);
    
    if (newQuestions.length === 0) {
        showToast('⚠️ لم يتم العثور على أسئلة في النص!', 'error');
        return;
    }
    
    questions.push(...newQuestions);
    saveData();
    updateQuestionList();
    updateCategorySelect();
    showToast(`✅ تمت إضافة ${newQuestions.length} سؤال!`, 'success');
}

// ========== الألوان ==========
function updateColors() {
    const root = document.documentElement;
    const team1 = document.getElementById('team1Color').value;
    const team2 = document.getElementById('team2Color').value;
    const bg = document.getElementById('bgColor').value;
    
    root.style.setProperty('--team1-color', team1);
    root.style.setProperty('--team2-color', team2);
    root.style.setProperty('--dark-bg', bg);
    root.style.setProperty('--primary', team1);
    
    localStorage.setItem('quizColors', JSON.stringify({
        team1: team1,
        team2: team2,
        bg: bg
    }));
}

function resetColors() {
    document.getElementById('team1Color').value = '#6C5CE7';
    document.getElementById('team2Color').value = '#FF6B6B';
    document.getElementById('bgColor').value = '#0a0a0a';
    updateColors();
    showToast('🔄 تم استعادة الألوان الافتراضية', 'success');
}

function loadColors() {
    const saved = localStorage.getItem('quizColors');
    if (saved) {
        try {
            const colors = JSON.parse(saved);
            document.getElementById('team1Color').value = colors.team1 || '#6C5CE7';
            document.getElementById('team2Color').value = colors.team2 || '#FF6B6B';
            document.getElementById('bgColor').value = colors.bg || '#0a0a0a';
            updateColors();
        } catch(e) {}
    }
}

// ========== بدء اللعبة ==========
function startGame() {
    const timerVal = parseInt(document.getElementById('timerDuration').value) || 30;
    const perTeam = parseInt(document.getElementById('questionsPerTeam').value) || 10;
    const selectedCategory = document.getElementById('categorySelect').value;
    
    // فلترة الأسئلة حسب القسم المختار
    let available = questions.filter(q => !q.used);
    if (selectedCategory !== 'all') {
        available = available.filter(q => q.category === selectedCategory);
    }
    
    if (available.length < perTeam * 2) {
        showToast(`⚠️ لا يوجد أسئلة كافية! تحتاج ${perTeam * 2} سؤال على الأقل.`, 'error');
        return;
    }

    // خلط الأسئلة
    const shuffled = [...available];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }

    const team1Questions = shuffled.slice(0, perTeam);
    const team2Questions = shuffled.slice(perTeam, perTeam * 2);

    gameQuestions = [];
    for (let i = 0; i < perTeam; i++) {
        gameQuestions.push({ ...team1Questions[i], team: 1 });
        gameQuestions.push({ ...team2Questions[i], team: 2 });
    }

    gameQuestions.forEach(q => {
        const original = questions.find(orig => orig.id === q.id);
        if (original) original.used = true;
    });

    teamScores = { 1: 0, 2: 0 };
    teamCorrect = { 1: 0, 2: 0 };
    teamWrong = { 1: 0, 2: 0 };
    currentIndex = 0;
    timeLeft = timerVal;

    saveData();
    showScreen('gameScreen');
    updateTeamDisplay();
    showQuestion();
    showToast('🚀 بدأت المسابقة! حظ سعيد للفريقين', 'success');
}

// ========== عرض السؤال ==========
function showQuestion() {
    if (currentIndex >= gameQuestions.length) {
        endGame();
        return;
    }

    const q = gameQuestions[currentIndex];
    currentTeam = q.team;
    isAnswered = false;

    document.getElementById('currentCategory').innerHTML = `<i class="fas fa-tag"></i> ${q.category}`;
    document.getElementById('questionNumber').innerHTML = `<i class="fas fa-hashtag"></i> ${currentIndex + 1} / ${gameQuestions.length}`;
    document.getElementById('questionTextDisplay').innerHTML = q.text;

    const container = document.getElementById('optionsContainer');
    container.innerHTML = q.options.map((opt, idx) => `
        <button onclick="selectAnswer(${idx})" id="opt_${idx}">
            <span class="opt-letter">${String.fromCharCode(65 + idx)}</span>
            ${opt}
        </button>
    `).join('');

    document.querySelectorAll('#optionsContainer button').forEach(b => b.disabled = false);

    document.getElementById('timerDisplay').textContent = timeLeft;
    document.getElementById('timerDisplay').className = 'timer';
    document.getElementById('nextBtn').disabled = true;

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timerDisplay').textContent = timeLeft;

        if (timeLeft <= 5) {
            document.getElementById('timerDisplay').classList.add('warning');
        }

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            if (!isAnswered) {
                isAnswered = true;
                const wrongTeam = currentTeam;
                teamWrong[wrongTeam]++;
                teamScores[wrongTeam] = Math.max(0, teamScores[wrongTeam] - 5);
                updateTeamDisplay();
                showCorrectAnswer();
                document.getElementById('nextBtn').disabled = false;
                showToast(`⏰ انتهى الوقت! الفريق ${currentTeam === 1 ? 'الأيمن' : 'الأيسر'} -5 نقاط`, 'warning');
            }
        }
    }, 1000);

    document.getElementById('nextBtn').disabled = true;
    saveData();
}

// ========== اختيار الإجابة ==========
function selectAnswer(selected) {
    if (isAnswered) return;
    isAnswered = true;
    clearInterval(timerInterval);

    const q = gameQuestions[currentIndex];
    const isCorrect = (selected === q.correct);
    const team = currentTeam;
    const teamName = team === 1 ? 'الأيمن' : 'الأيسر';

    if (isCorrect) {
        teamCorrect[team]++;
        teamScores[team] += 10;
        document.getElementById(`opt_${selected}`).classList.add('correct');
        showToast(`✅ إجابة صحيحة! الفريق ${teamName} +10 نقاط`, 'success');
    } else {
        teamWrong[team]++;
        teamScores[team] = Math.max(0, teamScores[team] - 5);
        document.getElementById(`opt_${selected}`).classList.add('wrong');
        showCorrectAnswer();
        showToast(`❌ إجابة خاطئة! الفريق ${teamName} -5 نقاط`, 'error');
    }

    document.querySelectorAll('#optionsContainer button').forEach(b => b.disabled = true);
    updateTeamDisplay();
    document.getElementById('nextBtn').disabled = false;
    saveData();
}

function showCorrectAnswer() {
    const q = gameQuestions[currentIndex];
    document.getElementById(`opt_${q.correct}`).classList.add('correct');
}

// ========== السؤال التالي ==========
function nextQuestion() {
    currentIndex++;
    if (currentIndex >= gameQuestions.length) {
        endGame();
    } else {
        timeLeft = parseInt(document.getElementById('timerDuration').value) || 30;
        document.getElementById('timerDisplay').className = 'timer';
        showQuestion();
    }
}

// ========== إنهاء المسابقة ==========
function endGame() {
    clearInterval(timerInterval);
    document.getElementById('questionTextDisplay').innerHTML = '<i class="fas fa-trophy" style="color: var(--accent); font-size: 2em; margin-left: 15px;"></i> 🏆 انتهت المسابقة!';
    document.getElementById('optionsContainer').innerHTML = '';
    document.getElementById('timerDisplay').textContent = '🎯';
    document.getElementById('nextBtn').disabled = true;

    let winnerText = '';
    if (teamScores[1] > teamScores[2]) {
        winnerText = '🟣 الفريق الأيمن فاز! 🎉';
    } else if (teamScores[2] > teamScores[1]) {
        winnerText = '🔴 الفريق الأيسر فاز! 🎉';
    } else {
        winnerText = '🤝 تعادل!';
    }
    document.getElementById('currentCategory').innerHTML = `<i class="fas fa-crown"></i> ${winnerText}`;
    document.getElementById('questionNumber').innerHTML = '🎊 نهاية المسابقة';
    showToast(`🏁 انتهت المسابقة! ${winnerText}`, 'success');
}

// ========== إعادة تعيين اللعبة ==========
function resetGame() {
    clearInterval(timerInterval);
    showScreen('adminScreen');
    updateQuestionList();
    updateTeamDisplay();
    updateCategorySelect();
}

// ========== تحديث عرض الفرق ==========
function updateTeamDisplay() {
    document.getElementById('team1Score').textContent = teamScores[1];
    document.getElementById('team2Score').textContent = teamScores[2];
    document.getElementById('team1Correct').textContent = teamCorrect[1];
    document.getElementById('team2Correct').textContent = teamCorrect[2];
    document.getElementById('team1Wrong').textContent = teamWrong[1];
    document.getElementById('team2Wrong').textContent = teamWrong[2];
}

// ========== تبديل الشاشات ==========
function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

// ========== Toast Notification ==========
function showToast(message, type = 'info') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    
    const icons = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-circle',
        warning: 'fa-exclamation-triangle',
        info: 'fa-info-circle'
    };
    
    toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${message}`;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100px)';
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}

// ========== استخراج الألوان من اللوجو ==========
function extractColorsFromLogo(img) {
    try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.naturalWidth || 100;
        canvas.height = img.naturalHeight || 100;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        const colors = [];
        for (let i = 0; i < 10; i++) {
            const x = Math.floor(Math.random() * canvas.width);
            const y = Math.floor(Math.random() * canvas.height);
            const pixel = ctx.getImageData(x, y, 1, 1).data;
            if (pixel[3] > 128) {
                colors.push(`#${pixel[0].toString(16).padStart(2,'0')}${pixel[1].toString(16).padStart(2,'0')}${pixel[2].toString(16).padStart(2,'0')}`);
            }
        }
        
        if (colors.length > 0) {
            document.getElementById('team1Color').value = colors[0];
            document.getElementById('team2Color').value = colors[1] || colors[0];
            updateColors();
            showToast('🎨 تم استخراج الألوان من اللوجو!', 'success');
        }
    } catch(e) {
        console.log('تعذر استخراج الألوان من اللوجو');
    }
}

// ========== التحميل عند فتح الصفحة ==========
window.onload = function() {
    loadData();
    showScreen('adminScreen');
    
    // محاولة استخراج الألوان من اللوجو
    const logo = document.getElementById('siteLogo');
    if (logo.complete) {
        extractColorsFromLogo(logo);
    } else {
        logo.addEventListener('load', function() {
            extractColorsFromLogo(this);
        });
    }
};
</script>
